---
- name: Install Docker Engine on Debian
  hosts: debian_prod
  become: true
  vars:
    old_docker_packages:
      - docker.io
      - docker-compose
      - docker-doc
      - podman-docker
      - containerd
      - runc

  tasks:
    - name: Uninstall unofficial or old Docker packages
      apt:
        name: "{{ old_docker_packages }}"
        state: absent
        update_cache: yes

    - name: Install prerequisite packages (including gnupg)
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Create directory for Docker APT keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Download Docker official GPG key
      get_url:
        url: https://download.docker.com/linux/debian/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: '0644'

    - name: Add Docker repository to Apt sources
      apt_repository:
        repo: >
          deb [arch={{ ansible_architecture | replace('x86_64', 'amd64') }} signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/debian
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present
        update_cache: yes

    - name: Install Docker Engine and plugins
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is started and enabled
      service:
        name: docker
        state: started
        enabled: yes

    - name: Verify Docker installation
      command: docker run hello-world
      register: docker_check
      changed_when: false
      failed_when: "'Hello from Docker!' not in docker_check.stdout"